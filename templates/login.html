{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}

<div class="container">
    <h2>Login</h2>

    <form method="POST">

        {{ form.hidden_tag() }}

        <p>
            {{ form.email.label }}<br>
            {{ form.email(size=40) }}
        </p>

        <p>
            {{ form.password.label }}<br>
            {{ form.password(size=40) }}
        </p>

        <p>
            {{ form.submit() }}
        </p>

    </form>

</div>

{% endblock %}
